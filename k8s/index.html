<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes 学习平台</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #2c3e50;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 40px;
        }

        .options {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .option-card {
            flex: 1;
            min-width: 250px;
            padding: 40px 30px;
            border-radius: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            border: 2px solid #f0f0f0;
        }

        .option-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .option-card.study {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
        }

        .option-card.exam {
            border-color: #28a745;
            background: linear-gradient(135deg, rgba(40, 167, 69, 0.05) 0%, rgba(28, 182, 85, 0.05) 100%);
        }

        .option-card.study:hover {
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .option-card.exam:hover {
            border-color: #28a745;
            box-shadow: 0 10px 30px rgba(40, 167, 69, 0.2);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .option-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .option-description {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .card {
                padding: 40px 20px;
            }

            .options {
                flex-direction: column;
            }

            .option-card {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🚀 Kubernetes 学习平台</h1>
            <p class="subtitle">全面掌握 Kubernetes 的核心概念和架构</p>

            <div class="options">
                <a href="concept/index.html" class="option-card study">
                    <div class="icon">📚</div>
                    <div class="option-title">学习指南</div>
                    <div class="option-description">
                        系统学习 Kubernetes 核心概念<br>
                        9大模块，循序渐进
                    </div>
                </a>

                <a href="exam/index.html" class="option-card exam">
                    <div class="icon">📝</div>
                    <div class="option-title">知识测评</div>
                    <div class="option-description">
                        检验学习成果，查漏补缺<br>
                        自定义模块，随机出题
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
