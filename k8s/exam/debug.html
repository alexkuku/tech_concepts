<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>调试页面</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .section {
            background: #f0f0f0;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #666;
        }
        .success { border-color: #28a745; }
        .error { border-color: #dc3545; }
        .warning { border-color: #ffc107; }
    </style>
</head>
<body>
    <h1>调试页面</h1>

    <!-- 加载版本配置 -->
    <script src="version-config.js"></script>

    <div id="output"></div>

    <script>
        function addSection(title, content, type = '') {
            const div = document.createElement('div');
            div.className = 'section ' + type;
            div.innerHTML = `<strong>${title}</strong><br>${content}`;
            document.getElementById('output').appendChild(div);
        }

        // 调试版本配置
        addSection('1. 版本配置检查',
            `QUESTION_VERSION_CONFIG: ${typeof QUESTION_VERSION_CONFIG}<br>` +
            `currentVersion: ${QUESTION_VERSION_CONFIG.currentVersion}<br>` +
            `版本文件: ${QUESTION_VERSION_CONFIG.versions[QUESTION_VERSION_CONFIG.currentVersion].questionFile}`
        );

        // 动态加载题目文件
        addSection('2. 开始加载题目文件...', '请等待...');

        const questionFile = QUESTION_VERSION_CONFIG.versions[QUESTION_VERSION_CONFIG.currentVersion].questionFile;
        const script = document.createElement('script');
        script.src = questionFile;

        script.onload = function() {
            addSection('3. 题目文件加载完成', '检查变量...');

            // 检查 questions 和 modules
            setTimeout(function() {
                if (typeof questions === 'undefined') {
                    addSection('❌ questions 变量未定义', '可能是 questions.js 文件格式问题', 'error');
                } else {
                    addSection('✅ questions 变量已定义', `类型: ${typeof questions}, 是数组: ${Array.isArray(questions)}`, 'success');
                    if (Array.isArray(questions)) {
                        addSection('✅ 题目数组', `总数量: ${questions.length}`, 'success');

                        // 显示前3道题目
                        let preview = questions.slice(0,3).map((q, i) =>
                            `${i+1}. [${q.module}] ${q.question}`
                        ).join('<br>');
                        addSection('题目预览', preview);
                    }
                }

                if (typeof modules === 'undefined') {
                    addSection('❌ modules 变量未定义', '可能是 questions.js 文件格式问题', 'error');
                } else {
                    addSection('✅ modules 变量已定义', `类型: ${typeof modules}, 是数组: ${Array.isArray(modules)}`, 'success');
                    if (Array.isArray(modules)) {
                        addSection('✅ 模块数组', `模块数量: ${modules.length}, 内容: ${JSON.stringify(modules)}`, 'success');
                    }
                }

                // 检查文件是否正确导出到全局作用域
                addSection('4. 作用域检查',
                    `window.questions: ${typeof window.questions}<br>` +
                    `window.modules: ${typeof window.modules}`
                );
            }, 100);
        };

        script.onerror = function() {
            addSection('❌ 题目文件加载失败', `文件: ${questionFile}<br>请检查文件是否存在且有正确的格式`, 'error');
        };

        document.head.appendChild(script);

        // 检查questions.js原始文件
        setTimeout(function() {
            fetch(questionFile)
                .then(response => response.text())
                .then(text => {
                    const start = text.indexOf('const questions');
                    const end = text.indexOf('const modules');

                    if (start === -1 || end === -1) {
                        addSection('❌ 文件格式检查', '缺少必要的变量声明', 'error');
                    } else {
                        const content = text.substring(start, end + 100);
                        const preview = 'const questions... (已找到)<br>...const modules... (已找到)<br>文件长度: ' + text.length + ' 字符';
                        addSection('✅ 文件内容检查', preview, 'success');
                    }
                })
                .catch(err => {
                    addSection('❌ 无法读取文件', err.message, 'error');
                });
        }, 500);
    </script>
</body>
</html>
